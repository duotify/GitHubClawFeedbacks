name: 課程問題回報
description: 在學習 GitHubClaw（龍蝦堡）課程時遇到問題？請填寫此表單，我們將盡快協助你！
title: "[問題] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        感謝你花時間填寫這份問題回報！請盡量提供詳細的資訊，幫助我們更快速地協助你。

  - type: dropdown
    id: issue-type
    attributes:
      label: 問題類型
      description: 請選擇最符合你情況的問題類型
      options:
        - 課程內容有誤（錯字、錯誤資訊）
        - 影片播放或載入問題
        - 操作步驟無法重現
        - 課程功能或平台問題
        - 其他疑問或建議
    validations:
      required: true

  - type: input
    id: chapter
    attributes:
      label: 問題發生的章節 / 影片名稱
      description: 請填寫問題發生的章節編號或影片標題，例如：「第三章 - Branch 分支策略」
      placeholder: 例如：第三章 - Branch 分支策略
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 問題描述
      description: 請詳細說明你遇到的問題或疑問
      placeholder: 請描述問題的具體情況，包含你預期的結果與實際發生的情況。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 重現步驟
      description: 請列出可以重現此問題的操作步驟（如適用）
      placeholder: |
        1. 開啟 ...
        2. 點擊 ...
        3. 出現 ...
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 截圖或錯誤訊息
      description: 如果有截圖或錯誤訊息，請貼在此處。你可以直接將圖片拖曳到這裡上傳。
      placeholder: 請貼上截圖或錯誤訊息（選填）
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: 作業系統 / 環境
      description: 你使用的作業系統與版本（如適用）
      placeholder: 例如：macOS 14.4、Windows 11、Ubuntu 22.04
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前確認
      options:
        - label: 我已搜尋現有 Issues，確認此問題尚未被回報過
          required: true
        - label: 我已提供足夠的細節，以便課程團隊協助我解決問題
          required: true
